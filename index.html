<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>CS2D Map Viewer</title>
    <style>
        html,body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
		#loading-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            color: white;
            font-family: sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
		#glcanvas {
            width: 100vw !important;
            height: 100vh !important;
            max-width: calc(100vh * (16 / 9)) !important;
            max-height: calc(100vw * (9 / 16)) !important;
            outline: none;
            -webkit-tap-highlight-color: transparent;
		}
    </style>
</head>
<body>
	<div id="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">Loading</div>
    </div>
	<canvas id="glcanvas" tabindex='1'></canvas>
    <script>
        const c = document.getElementById('glcanvas');
        const INTERNAL_W = 1920;
        const INTERNAL_H = 1080;
        c.setAttribute('width', INTERNAL_W);
        c.setAttribute('height', INTERNAL_H);
        Object.defineProperty(c, 'width', { get: () => INTERNAL_W, set: () => {} });
        Object.defineProperty(c, 'height', { get: () => INTERNAL_H, set: () => {} });

        function patchCoordinateScaling(proto) {
            const origX = Object.getOwnPropertyDescriptor(proto, 'clientX');
            const origY = Object.getOwnPropertyDescriptor(proto, 'clientY');

            Object.defineProperty(proto, 'clientX', {
                get: function() {
                    let val = origX.get.call(this);
                    if (this.target && this.target.id === 'glcanvas') {
                        let rect = this.target.getBoundingClientRect();
                        let scale = INTERNAL_W / rect.width;
                        return (val - rect.left) * scale + rect.left;
                    }
                    return val;
                }
            });

            Object.defineProperty(proto, 'clientY', {
                get: function() {
                    let val = origY.get.call(this);
                    if (this.target && this.target.id === 'glcanvas') {
                        let rect = this.target.getBoundingClientRect();
                        let scale = INTERNAL_H / rect.height;
                        return (val - rect.top) * scale + rect.top;
                    }
                    return val;
                }
            });
        }

        patchCoordinateScaling(MouseEvent.prototype);
        if (typeof Touch !== 'undefined') {
            patchCoordinateScaling(Touch.prototype);
        }
    </script>
	<script src="./js/gl.min.js"></script>
    <script src="./js/audio.js"></script>
	<script src="./js/query.js"></script>
    <script>	
		const origRaf = window.requestAnimationFrame;
        window.requestAnimationFrame = function(callback) {
            document.getElementById('loading-container').style.display = 'none';
            window.requestAnimationFrame = origRaf;
            return origRaf(callback);
        };
	
        load("target/wasm32-unknown-unknown/debug/cs2d-map-viewer.wasm");
    </script>
</body>
</html>
