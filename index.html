<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>CS2D Map Viewer</title>
    <style>
        html,body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
		#loading-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            color: white;
            font-family: sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
		#glcanvas {
            width: 100vw !important;
            height: 100vh !important;
            max-width: calc(100vh * (16 / 9)) !important;
            max-height: calc(100vw * (9 / 16)) !important;
            outline: none;
            -webkit-tap-highlight-color: transparent;
		}
    </style>
</head>
<body>
	<div id="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">Loading</div>
    </div>
	<canvas id="glcanvas" width="1920" height="1080" tabindex='1'></canvas>
	<script src="./js/gl.min.js"></script>
    <script src="./js/audio.js"></script>
	<script src="./js/query.js"></script>
    <script>	
		const origRaf = window.requestAnimationFrame;
        window.requestAnimationFrame = function(callback) {
            document.getElementById('loading-container').style.display = 'none';
            window.requestAnimationFrame = origRaf;
            return origRaf(callback);
        };
	
        load("target/wasm32-unknown-unknown/debug/cs2d-map-viewer.wasm");
    </script>
</body>
</html>
